<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il Cantiere del Welfare — Orientati</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&family=Karla:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: transparent; 
  --surface: #FFFFFF;
  --text: #1A1A18;
  --text-muted: #6B6B65;
  --accent: #2B4C3F;
  --border: #E2DDD6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Karla', sans-serif; font-size: 17px; background: var(--bg); color: var(--text); line-height: 1.6; }

header { display: none; } 

main { max-width: 1300px; margin: 0 auto; padding: 20px; }
.step { display: none; } .step.active { display: block; }

/* GRIGLIA TEMI */
.temi { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
.tema-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; cursor: pointer; text-align: left; transition: 0.3s; min-height: 140px; }
.tema-btn.selected { border: 3px solid var(--accent); background: #fdfdfd; }
.tema-btn .tl { font-family: 'Inter'; font-weight: 700; font-size: 1.1rem; margin-bottom: 8px; border-bottom: 2px solid var(--accent); padding-bottom: 5px; display: inline-block; }

.btn-vai { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 15px 35px; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-top: 30px; }
.btn-vai:disabled { opacity: 0.3; }

/* RISULTATI: IMMAGINI PICCOLE + TESTO */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; display: flex; gap: 25px; align-items: flex-start; }
.card-img { width: 180px; height: 120px; object-fit: cover; border-radius: 8px; flex-shrink: 0; background: #eee; }
.card-content { flex: 1; }
.card-title { font-family: 'Inter'; font-weight: 700; font-size: 1.25rem; margin-bottom: 10px; color: var(--text); line-height: 1.3; }
.card-excerpt { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-link { color: var(--accent); text-decoration: none; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; border-bottom: 1px solid var(--accent); }

@media (max-width: 1024px) { .temi { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) { 
    .temi { grid-template-columns: 1fr; } 
    .card { flex-direction: column; gap: 15px; }
    .card-img { width: 100%; height: 180px; }
}
</style>
</head>
<body>

<main>
  <div class="step active" id="step-tema">
    <h1 style="font-family:'Inter'; color:#fff; text-align:center; margin-bottom:40px;">Orientati tra i contenuti</h1>
    <div class="temi" id="griglia-temi"></div>
    <div style="text-align:center;"><button class="btn-vai" id="btn-vai" disabled>Esplora →</button></div>
  </div>

  <div class="step" id="step-contenuti">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; border-bottom:1px solid rgba(255,255,255,0.3); padding-bottom:15px;">
      <h2 id="tema-titolo" style="font-family:'Inter'; font-size:1.8rem; color:#fff;"></h2>
      <button onclick="location.reload()" style="cursor:pointer; padding:8px 15px; background:#fff; border:none; border-radius:5px; font-weight:700;">Indietro</button>
    </div>
    <div id="cards-container"></div>
  </div>
</main>

<script>
const RSS_URL = 'https://www.ilcantierewelfare.it/feed/';
const PROXY = 'https://hidden-credit-a674.cantierewelfare-podcast.workers.dev/?url=';
const BACKUP_IMG = 'https://www.ilcantierewelfare.it/wp-content/uploads/2026/01/LOGO-SOTTILE.png';

const temi = {
  nonAutosufficienza: { titolo: 'Non Autosufficienza', kw: ['autosufficienza','anzian','rsa','caregiver'] },
  coprogettazione: { titolo: 'Co-progettazione', kw: ['coprogettazione','co-progettazione','amministrazione condivisa'] },
  innovazione: { titolo: 'Innovazione', kw: ['innovazione','generativ','sperimentazione'] },
  demografia: { titolo: 'Demografia', kw: ['demograf','invecchiam','popolazione'] },
  strumenti: { titolo: 'Strumenti e Governance', kw: ['governance','piano di zona','programmazione'] },
  giovani: { titolo: 'Giovani', kw: ['giovan','generazione','minori'] },
  cultura: { titolo: 'Cultura e Cura', kw: ['cultura','arte','ibridi'] }
};

const griglia = document.getElementById('griglia-temi');
Object.keys(temi).forEach(key => {
  griglia.innerHTML += `<button class="tema-btn" data-tema="${key}"><div class="tl">${temi[key].titolo}</div></button>`;
});

let selected = null;
griglia.addEventListener('click', (e) => {
  const btn = e.target.closest('.tema-btn');
  if(!btn) return;
  document.querySelectorAll('.tema-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selected = btn.dataset.tema;
  document.getElementById('btn-vai').disabled = false;
});

document.getElementById('btn-vai').addEventListener('click', async () => {
  const t = temi[selected];
  document.getElementById('tema-titolo').textContent = t.titolo;
  document.getElementById('step-tema').classList.remove('active');
  document.getElementById('step-contenuti').classList.add('active');
  await fetchAndRender(t.kw);
});

async function fetchAndRender(keywords) {
  const container = document.getElementById('cards-container');
  container.innerHTML = "<h2 style='color:#fff'>Caricamento...</h2>";
  
  try {
    const res = await fetch(PROXY + encodeURIComponent(RSS_URL));
    const text = await res.text();
    const xml = new DOMParser().parseFromString(text, "text/xml");
    const items = Array.from(xml.querySelectorAll("item"));

    const filtered = items.filter(item => {
      const content = (item.querySelector("title").textContent + (item.querySelector("description")?.textContent || "")).toLowerCase();
      return keywords.some(kw => content.includes(kw.toLowerCase()));
    }).slice(0, 10);

    container.innerHTML = filtered.map(item => {
      const title = item.querySelector("title").textContent;
      const link = item.querySelector("link").textContent;
      const rawDesc = item.querySelector("description")?.textContent || "";
      
      // Pulizia testo per l'estratto (due righe)
      const tmp = document.createElement("DIV");
      tmp.innerHTML = rawDesc;
      const excerpt = tmp.textContent || tmp.innerText || "";

      // Logica Immagine
      let imgUrl = BACKUP_IMG;
      const imgMatch = rawDesc.match(/<img[^>]+src=["']([^"']+)["']/);
      if (imgMatch) imgUrl = imgMatch[1];

      return `
        <div class="card">
          <img src="${imgUrl}" class="card-img" onerror="this.src='${BACKUP_IMG}'">
          <div class="card-content">
            <div class="card-title">${title}</div>
            <div class="card-excerpt">${excerpt}</div>
            <a href="${link}" target="_blank" class="card-link">Leggi di più</a>
          </div>
        </div>
      `;
    }).join('');
  } catch (e) { container.innerHTML = "<h2 style='color:#fff'>Errore nel caricamento.</h2>"; }
}
</script>
</body>
</html>
