<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il Cantiere del Welfare — Orientati</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&family=Karla:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --text: #1A1A18;
  --text-muted: #6B6B65;
  --text-faint: #9E9E96;
  --accent: #2B4C3F;
  --accent-light: #E8F0ED;
  --border: #E2DDD6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Karla', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 17px; }

header { padding: 1.25rem 2rem; border-bottom: 1px solid var(--border); background: var(--surface); }

main { max-width: 1300px; margin: 0 auto; padding: 2rem 1.5rem; }
.step { display: none; } .step.active { display: block; }

.hero { padding: 2rem 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
.hero-claim { font-family: 'Inter', sans-serif; font-size: 1.8rem; font-weight: 700; line-height: 1.3; color: var(--text); margin-bottom: 10px; }
.hero-sub { color: var(--text-muted); max-width: 800px; }

.temi { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 2rem 0; }
.tema-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; cursor: pointer; text-align: left; transition: 0.2s; min-height: 160px; display: flex; flex-direction: column; }
.tema-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.tema-btn.selected { border: 3px solid var(--accent); background: var(--accent-light); }
.tema-btn .tl { font-family: 'Inter', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.tema-btn .ts { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; }

.btn-vai { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 1rem 2.5rem; font-size: 1rem; font-family: 'Inter', sans-serif; font-weight: 700; cursor: pointer; }
.btn-vai:disabled { opacity: 0.35; }

/* SEZIONI ORIZZONTALI (MODIFICATE DA COLONNE A RIGHE) */
.sez { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; width: 100%; }
.sez-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--accent-light); }
.sez-header h3 { font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); }

/* LISTA CONTENUTI */
.card { padding: 1rem 0; border-bottom: 1px solid var(--border); display: flex; gap: 20px; align-items: flex-start; }
.card:last-child { border-bottom: none; }
.card-body { flex: 1; }
.card-title { font-family: 'Inter', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.card-desc { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 10px; line-height: 1.5; }
.card-link { font-weight: 700; color: var(--accent); text-decoration: none; font-size: 0.9rem; }

/* SCARICABILI ORIZZONTALI */
.scard-grid { display: flex; flex-direction: column; gap: 10px; }
.scard { background: var(--accent-light); border-radius: 8px; padding: 1.25rem; }

@media (max-width: 900px) { .temi { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .temi { grid-template-columns: 1fr; } .hero-claim { font-size: 1.5rem; } }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:1.25rem;max-width:1300px;margin:0 auto;">
    <img src="https://www.ilcantierewelfare.it/wp-content/uploads/2026/01/LOGO-SOTTILE.png" alt="Logo" style="height:40px;">
    <span style="font-family:'Inter',sans-serif;font-size:1.2rem;font-weight:700;">Il Cantiere del Welfare</span>
  </div>
</header>

<main>

<div class="step active" id="step-tema">
  <div class="hero">
    <h1 class="hero-claim">Un ecosistema editoriale per chi lavora nel welfare e vuole pensare, non solo informarsi.</h1>
    <p class="hero-sub">Scegli un tema per orientarti tra podcast, articoli, newsletter e scaricabili. Un progetto di Davide Vairani.</p>
  </div>

  <div class="temi">
    <button class="tema-btn" data-tema="nonAutosufficienza">
      <div class="tl">Non autosufficienza</div>
      <div class="ts">Anziani, disabilità, RSA e domiciliarità. Riforma della non autosufficienza e lavoro di cura.</div>
    </button>
    <button class="tema-btn" data-tema="coprogettazione">
      <div class="tl">Co-progettazione e terzo settore</div>
      <div class="ts">ETS, cooperative, appalti e sussidiarietà. Welfare aziendale e relazioni pubblico-privato.</div>
    </button>
    <button class="tema-btn" data-tema="innovazione">
      <div class="tl">Innovazione e futuro del welfare</div>
      <div class="ts">Welfare generativo, impresa sociale e sperimentazione. Nuovi modelli e scenari futuri.</div>
    </button>
    <button class="tema-btn" data-tema="demografia">
      <div class="tl">Demografia e disuguaglianze</div>
      <div class="ts">Invecchiamento, immigrazione, genere e povertà. Divari territoriali e sfide demografiche.</div>
    </button>
    <button class="tema-btn" data-tema="strumenti">
      <div class="tl">Strumenti e governance</div>
      <div class="ts">Piani di zona, ambiti, LEP e programmazione. Pubblica amministrazione e gestione associata.</div>
    </button>
    <button class="tema-btn" data-tema="giovani">
      <div class="tl">Giovani e futuro</div>
      <div class="ts">Generazioni, Gen Z, lavoro e partecipazione. Prospettive demografiche e scenari futuri.</div>
    </button>
    <button class="tema-btn" data-tema="cultura">
      <div class="tl">Luoghi, cultura e cura</div>
      <div class="ts">Welfare culturale, prescrizione sociale e spazi ibridi. Impresa culturale e comunità generative.</div>
    </button>
  </div>
  <div style="text-align:center;"><button class="btn-vai" id="btn-vai" disabled>Mostrami i contenuti →</button></div>
</div>

<div class="step" id="step-contenuti">
  <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:2rem; border-bottom:1px solid var(--border); padding-bottom:1.5rem;">
    <div>
      <h2 id="tema-titolo" style="font-family:'Inter'; font-size:1.8rem; margin-bottom:5px; color:var(--accent);"></h2>
      <p id="tema-desc" style="color:var(--text-muted);"></p>
    </div>
    <button onclick="location.reload()" style="cursor:pointer; padding:8px 15px; border:1px solid var(--border); border-radius:5px; background:white; font-weight:600;">← cambia tema</button>
  </div>

  <div class="sez">
    <div class="sez-header"><h3>Articoli</h3><span id="count-art" class="sez-count"></span></div>
    <div class="cards-list" id="cards-art"></div>
  </div>

  <div class="sez">
    <div class="sez-header"><h3>Podcast</h3><span id="count-pod" class="sez-count"></span></div>
    <div class="cards-list" id="cards-pod"></div>
  </div>

  <div class="sez">
    <div class="sez-header"><h3>Newsletter</h3><span id="count-nl" class="sez-count"></span></div>
    <div class="cards-list" id="cards-nl"></div>
  </div>

  <div class="sez" id="sez-sc" style="display:none">
    <div class="sez-header"><h3>Scaricabili</h3><span id="count-sc" class="sez-count"></span></div>
    <div class="scard-grid" id="cards-sc"></div>
  </div>
</div>

</main>

<script>
// QUI HO MANTENUTO TUTTO IL TUO JAVASCRIPT ORIGINALE (Database Newsletter, Filtri, kw, ecc.)
const CF = 'https://hidden-credit-a674.cantierewelfare-podcast.workers.dev/?url=';
const WP = 'https://www.ilcantierewelfare.it/feed/';
const POD = 'https://anchor.fm/s/1096ce4cc/podcast/rss';
const POD_PAGE = 'https://www.ilcantierewelfare.it/podcast-cantiere-welfare/';

const temi = {
  nonAutosufficienza: { titolo: 'Non autosufficienza', desc: 'Anziani, disabilità, RSA e domiciliarità. Riforma della non autosufficienza e lavoro di cura.', kw: ['autosufficienza','anzian','rsa','domiciliar','badant','ltc','disabilit','cura','caregiver','riforma','residenzial','lombardia','invecchiam','spendiamo','vivere a lungo','dlgs 29','prestazione universale','progetto di vita','longevit'] },
  coprogettazione: { titolo: 'Co-progettazione e terzo settore', desc: 'ETS, cooperative, appalti e sussidiarietà. Welfare aziendale e relazioni pubblico-privato.', kw: ['co-progettazione','coprogettazione','terzo settore','cooperativ','ets','sussidiarietà','appalti','gara','affidamento','welfare aziendale','impresa sociale','economia sociale','codice del terzo settore','welfare in gara','contratto sociale','zandonai','venturi','maino'] },
  innovazione: { titolo: 'Innovazione e futuro del welfare', desc: 'Welfare generativo, impresa sociale e sperimentazione. Nuovi modelli e scenari futuri.', kw: ['innovazione','welfare generativ','impresa sociale','secondo welfare','ecosistem','sperimentazione','pnrr','rigenerazione','will','laboratorio','nuovo modello','neuro','behavioural','kublai','ctrl+z','328','infrastruttura','generativ','apprendimento istituzionale'] },
  demografia: { titolo: 'Demografia e disuguaglianze', desc: 'Invecchiamento, immigrazione, genere e povertà. Divari territoriali e sfide demografiche.', kw: ['demograf','disuguaglian','immigrazione','genere','povertà','invecchiamento','denatalità','territorio','divario','migrant','donna','gender','asiatico','volontariato','classe','spendiamo','vivere a lungo','economia sociale è donna','cura invisibile'] },
  strumenti: { titolo: 'Strumenti e governance', desc: 'Piani di zona, ambiti, LEP e programmazione. Pubblica amministrazione e gestione associata.', kw: ['governance','piano di zona','ambito','programmazione','lep','riforma','bilancio','comune','pubblica amministrazione','gestione associata','ats','distrett','ctrl+z','328','welfare in gara','neuro public','pa di prossimità','facilitare','cambiamento','servizi','collaborazione'] },
  giovani: { titolo: 'Giovani e futuro', desc: 'Generazioni, Gen Z, lavoro e partecipazione. Prospettive demografiche e scenari futuri.', kw: ['giovan','generazione','gen z','millennial','futuro','lavoro','neet','demografico','partecipazione','scuola','under','scomparsa','rosina','pierantoni','alfa','beta gen','secolo delle generazioni'] },
  cultura: { titolo: 'Luoghi, cultura e cura', desc: 'Welfare culturale, prescrizione sociale dell\'arte, spazi ibridi e impresa culturale.', kw: ['cultura','welfare culturale','prescrizione','arte','spazi ibridi','ibridi','community hub','casa di quartiere','ecosistemi','impresa culturale','luoghi','cura','generativit','censis','non spettatori','partecipazione culturale'] }
};

const newsletter = [
  { n:25, titolo:'Cosa rimane quando il progetto finisce?', link:'https://www.linkedin.com/pulse/le-fondamenta-davide-vairani-cflef/', kw:['innovazione','sperimentazione','progetto','will','bergamo'] },
  { n:24, titolo:'Il procedimento non è il prodotto', link:'https://www.linkedin.com/pulse/le-fondamenta-davide-vairani-6m9of/', kw:['governance','procedimento','pubblica amministrazione','strumenti'] },
  { n:23, titolo:'Fiducia, tempo e collaborazione', link:'https://www.linkedin.com/pulse/costruire-welfare-davide-vairani-tvr5f/', kw:['collaborazione','fiducia','coprogettazione','terzo settore'] },
  { n:22, titolo:'Case di Quartiere', link:'https://www.linkedin.com/pulse/costruire-welfare-davide-vairani-wgosf/', kw:['comunità','quartiere','prossimità','spazi','ibridi'] },
  { n:21, titolo:'Welfare e territorio', link:'https://www.linkedin.com/pulse/costruire-welfare-davide-vairani-vwm7f/', kw:['territorio','welfare','governance','ambito'] },
  { n:20, titolo:'Oltre l\'emergenza', link:'https://www.linkedin.com/pulse/costruire-welfare-davide-vairani-vwm7f/', kw:['emergenza','innovazione','futuro','modello'] },
  { n:19, titolo:'Essere ibridi: welfare e luoghi', link:'https://www.linkedin.com/pulse/costruire-welfare-davide-vairani-bji0f/', kw:['ibridi','luoghi','spazi','comunità','innovazione'] },
  { n:18, titolo:'Sviluppo di comunità', link:'https://www.linkedin.com/pulse/costruire-welfare-davide-vairani-gzfff/', kw:['comunità','sviluppo','partecipazione','territorio'] },
  { n:17, titolo:'L\'economia della cura invisibile', link:'https://www.linkedin.com/pulse/costruire-welfare-davide-vairani-xi1af/', kw:['cura','genere','donna','economia','badant','disuguaglian'] },
  { n:16, titolo:'PA di prossimità', link:'https://www.linkedin.com/pulse/costruire-welfare-davide-vairani-qhzpf/', kw:['pa','prossimità','pubblica amministrazione','governance','strumenti'] },
  { n:15, titolo:'Il Progetto di Vita', link:'https://www.linkedin.com/pulse/costruire-welfare-davide-vairani-e9kbf/', kw:['progetto di vita','disabilit','autosufficienza','riforma'] },
  { n:14, titolo:'Abitare la longevità', link:'https://www.linkedin.com/pulse/costruire-welfare-davide-vairani-bkjof/', kw:['longevit','anzian','invecchiam','autosufficienza','cura'] },
  { n:13, titolo:'Le Cooperative di Comunità', link:'https://www.linkedin.com/pulse/costruire-welfare-davide-vairani-kkvbc/', kw:['cooperativ','comunità','terzo settore','impresa sociale'] },
  { n:12, titolo:'Le Comunità di Pratica', link:'https://www.linkedin.com/pulse/costruire-welfare-davide-vairani-drbjf/', kw:['comunità','pratica','apprendimento','innovazione','organizzazione'] },
  { n:11, titolo:'Biblioteche di prossimità', link:'https://www.linkedin.com/pulse/costruire-welfare-davide-vairani-hscdf/', kw:['prossimità','luoghi','comunità','spazi'] },
  { n:10, titolo:'Essere ibridi per comunità generative', link:'https://www.linkedin.com/pulse/costruire-welfare-davide-vairani-2tisf/', kw:['ibridi','generativ','comunità','innovazione','ecosistem'] },
  { n:9,  titolo:'PSPP: rigenerare luoghi e comunità', link:'https://www.linkedin.com/pulse/costruire-welfare-davide-vairani-et3of/', kw:['rigenerazione','luoghi','comunità','pnrr','innovazione'] },
  { n:8,  titolo:'L\'Eta Beta delle politiche pubbliche', link:'https://www.linkedin.com/pulse/costruire-welfare-davide-vairani-ish9f/', kw:['politiche','pubblica amministrazione','innovazione','futuro','governance'] },
  { n:7,  titolo:'Facilitare il cambiamento nei servizi', link:'https://www.linkedin.com/pulse/costruire-welfare-davide-vairani-y3ikf/', kw:['cambiamento','servizi','facilitare','strumenti','governance'] },
  { n:6,  titolo:'Fare spazio alla collaborazione', link:'https://www.linkedin.com/pulse/costruire-welfare-davide-vairani-y3ikf/', kw:['collaborazione','spazio','coprogettazione','terzo settore'] },
  { n:5,  titolo:'Spazi ibridi socioculturali e welfare collaborativo', link:'https://www.linkedin.com/pulse/costruire-welfare-davide-vairani-hicef/', kw:['ibridi','spazi','collaborativo','comunità','innovazione'] },
  { n:4,  titolo:'Welfare come infrastruttura generativa', link:'https://www.linkedin.com/pulse/curatore-editoriale-il-cantiere-del-welfare-davide-vairani-nr90f/', kw:['infrastruttura','generativ','welfare','innovazione','modello'] },
];

const scaricabili = {
  nonAutosufficienza: [],
  coprogettazione: [{ titolo:'Tracce n.1 — Il welfare come infrastruttura generativa', desc:'Conversazione con Flaviano Zandonai su programmazione, sistemi integrati e apprendimento istituzionale.', link:'https://www.ilcantierewelfare.it/wp-content/uploads/2026/03/TRACCE-n.-1.pdf' }],
  innovazione: [{ titolo:'Tracce n.1 — Il welfare come infrastruttura generativa', desc:'Conversazione con Flaviano Zandonai. Materiali e trascrizione completa.', link:'https://www.ilcantierewelfare.it/wp-content/uploads/2026/03/TRACCE-n.-1.pdf' }],
  demografia: [],
  strumenti: [
    { titolo:'Senza Padroni n.1 — La libertà come infrastruttura sociale', desc:'Riflessione sul concetto di libertà come fondamento del welfare territoriale.', link:'https://www.ilcantierewelfare.it/wp-content/uploads/2026/03/Senza-Padroni-n.-1.pdf' },
    { titolo:'Senza Padroni n.2 — La libertà come potere di contestazione', desc:'Philip Pettit e la differenza tra subire un\'interferenza e vivere in stato di dominazione.', link:'https://www.ilcantierewelfare.it/wp-content/uploads/2026/03/SENZA-PADRONI-n.-2.pdf' }
  ],
  giovani: [], cultura: []
};

const articoliEsterni = {
  innovazione: [{ titolo: "Intelligenza artificiale e welfare sociale in Italia", desc: "Una mappa per livelli tra applicazioni esistenti e criticità.", link: "https://www.diculther.it/rivista/intelligenza-artificiale-e-welfare-sociale-in-italiauna-mappa-per-livelli-tra-applicazioni-esistenti-criticita-strutturali-e-piste-di-sviluppo/" }],
  cultura: [
    { titolo: "L'arte come prescrizione sociale: l'Italia compie il grande passo", desc: "Il Protocollo MiC-Salute sulla prescrizione sociale dell'arte.", link: "https://www.agenziacult.it/letture-lente/welfare-culturale/larte-come-prescrizione-sociale-litalia-compie-il-grande-passo/" },
    { titolo: "Censis 2025: la generatività come risposta al declino", desc: "Il passaggio alla generatività sociale e al welfare culturale.", link: "https://www.agenziacult.it/letture-lente/welfare-culturale/censis-2025-la-generativita-come-risposta-al-declino-del-desiderio-di-futuro/" }
  ]
};

let wpCache = [], podCache = [], selectedTema = null;

document.querySelectorAll('.tema-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tema-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedTema = btn.dataset.tema;
    document.getElementById('btn-vai').disabled = false;
  });
});

document.getElementById('btn-vai').addEventListener('click', async () => {
  const t = temi[selectedTema];
  document.getElementById('tema-titolo').textContent = t.titolo;
  document.getElementById('tema-desc').textContent = t.desc;
  document.getElementById('step-tema').classList.remove('active');
  document.getElementById('step-contenuti').classList.add('active');
  await loadAndRender();
});

async function fetchFeed(url) {
  try {
    const res = await fetch(CF + encodeURIComponent(url));
    const txt = await res.text();
    const xml = new DOMParser().parseFromString(txt, 'application/xml');
    return Array.from(xml.querySelectorAll('item')).map(i => ({
      title: i.querySelector('title')?.textContent||'',
      link: i.querySelector('link')?.textContent||'',
      description: i.querySelector('description')?.textContent||'',
      categories: Array.from(i.querySelectorAll('category')).map(c=>c.textContent.toLowerCase())
    }));
  } catch(e) { return []; }
}

function matches(text, kw) {
  const low = text.toLowerCase();
  return kw.some(k => low.includes(k.toLowerCase()));
}

async function loadAndRender() {
  const kw = temi[selectedTema].kw;
  if (!wpCache.length || !podCache.length) {
    [wpCache, podCache] = await Promise.all([fetchFeed(WP), fetchFeed(POD)]);
  }

  // ARTICOLI (WP + Esterni)
  const wpArt = wpCache.filter(i => !i.categories.includes('podcast') && !i.categories.includes('newsletter') && matches(i.title + i.description, kw));
  const extArt = articoliEsterni[selectedTema] || [];
  const allArt = [...extArt, ...wpArt.map(i => ({ titolo: i.title, desc: i.description.replace(/<[^>]*>?/gm, '').substring(0, 160)+'...', link: i.link }))];
  renderSez('cards-art', 'count-art', allArt.slice(0,5), 'Leggi');

  // PODCAST
  const pod = podCache.filter(i => matches(i.title + i.description, kw)).map(i => ({ titolo: i.title, desc: i.description.replace(/<[^>]*>?/gm, '').substring(0, 160)+'...', link: POD_PAGE }));
  renderSez('cards-pod', 'count-pod', pod.slice(0,4), 'Ascolta');

  // NEWSLETTER
  const nl = newsletter.filter(n => matches(n.titolo + n.kw.join(' '), kw)).map(n => ({ titolo: `#${n.n} — ${n.titolo}`, desc: '', link: n.link }));
  renderSez('cards-nl', 'count-nl', nl.slice(0,4), 'Leggi su LinkedIn');

  // SCARICABILI
  const sc = scaricabili[selectedTema] || [];
  const scEl = document.getElementById('sez-sc');
  if(sc.length) {
    scEl.style.display = 'block';
    document.getElementById('count-sc').textContent = sc.length;
    document.getElementById('cards-sc').innerHTML = sc.map(s => `<div class="scard"><div class="card-title">${s.titolo}</div><div class="card-desc">${s.desc}</div><a class="card-link" href="${s.link}" target="_blank">Scarica PDF →</a></div>`).join('');
  } else { scEl.style.display = 'none'; }
}

function renderSez(id, countId, items, label) {
  const el = document.getElementById(id);
  document.getElementById(countId).textContent = items.length;
  if(!items.length) { el.innerHTML = '<div style="color:#999; font-style:italic; font-size:0.9rem;">Nessun contenuto.</div>'; return; }
  el.innerHTML = items.map(i => `<div class="card"><div class="card-body"><div class="card-title">${i.titolo}</div><div class="card-desc">${i.desc}</div><a class="card-link" href="${i.link}" target="_blank">${label} →</a></div></div>`).join('');
}
</script>
</body>
</html>
