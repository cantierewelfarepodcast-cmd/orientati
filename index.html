    { t: "Abitare la longevità: infrastrutture di prossimità contro la crisi della cura", l: "https://www.ilcantierewelfare.it/abitare-la-longevita-infrastrutture-di-prossimita-contro-la-crisi-della-cura/", type: "articolo", cat: "LTC" }
];
 
// ─── STATO ───────────────────────────────────────────────────────────────────
let currentFilter = 'all';
let currentCat = null;
const linkGiaPresenti = new Set(DB.map(i => i.l));
 
// ─── FETCH AUTOMATICO NUOVI ARTICOLI DA WORDPRESS ────────────────────────────
// Carica i 20 articoli più recenti e aggiunge quelli non ancora nel DB
async function fetchNuoviArticoli() {
    try {
        const url = 'https://www.ilcantierewelfare.it/wp-json/wp/v2/posts?per_page=20&page=1&_fields=id,title,link,categories';
        const res = await fetch(url);
        if (!res.ok) return;
        const posts = await res.json();
        let aggiunti = 0;
        posts.forEach(post => {
            if (!linkGiaPresenti.has(post.link)) {
                DB.unshift({
                    t: post.title.rendered,
                    l: post.link,
                    type: 'articolo',
                    cat: getCatName(post.categories),
                    nuovo: true
                });
                linkGiaPresenti.add(post.link);
                aggiunti++;
            }
        });
        if (aggiunti > 0) search();
    } catch (e) {
        // CORS o rete non disponibile: usa solo il DB statico
    }
}
 
// ─── RENDER ───────────────────────────────────────────────────────────────────
function getLabelType(type) {
    const labels = { articolo: 'ARTICOLO', news: 'NEWSLETTER', podcast: 'PODCAST', pdf: 'DOCUMENTO PDF' };
    return labels[type] || type.toUpperCase();
}
 
function render(data) {
    const container = document.getElementById('risultati');
    const contatore = document.getElementById('contatore');
    contatore.textContent = data.length + ' risultati';
    if (data.length === 0) {
        container.innerHTML = '<p class="nessun-risultato">Nessun risultato trovato. Prova con altre parole chiave.</p>';
        return;
    }
    container.innerHTML = data.map(item => `
        <div class="risorsa-card">
            <span class="tag tag-${item.type}">${getLabelType(item.type)}</span>
            <span style="font-size: 12px; color: #888;">${item.cat}</span>
            ${item.nuovo ? '<span class="badge-nuovo">NUOVO</span>' : ''}
            <div style="margin-top:5px;">
                <a href="${item.l}" target="_blank" class="link-risorsa">${item.t}</a>
            </div>
        </div>
    `).join('');
}
 
// ─── FILTRI ───────────────────────────────────────────────────────────────────
function filterType(type, btn) {
    currentFilter = type;
    currentCat = null;
    document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    search();
}
 
function filterCat(cat, btn) {
    currentCat = currentCat === cat ? null : cat;
    currentFilter = 'all';
    document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
    if (currentCat) btn.classList.add('active');
    else document.querySelector('.btn-nav').classList.add('active');
    search();
}
 
function search() {
    const query = document.getElementById('search-input').value.toLowerCase().trim();
    const filtered = DB.filter(item => {
        const matchType = currentFilter === 'all' || item.type === currentFilter;
        const matchCat = !currentCat || item.cat === currentCat ||
            (currentCat === 'Anziani' && item.cat === 'LTC') ||
            (currentCat === 'Strumenti' && item.cat === 'PA');
        const matchQuery = !query || item.t.toLowerCase().includes(query) || item.cat.toLowerCase().includes(query);
        return matchType && matchCat && matchQuery;
    });
    render(filtered);
}
 
// ─── INIT ─────────────────────────────────────────────────────────────────────
render(DB);
fetchNuoviArticoli();
</script>
