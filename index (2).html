<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il Cantiere del Welfare — Orientati</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --text: #1A1A18;
    --text-muted: #6B6B65;
    --text-faint: #9E9E96;
    --accent: #2B4C3F;
    --accent-light: #E8F0ED;
    --border: #E2DDD6;
    --podcast: #1A3A5C;
    --podcast-bg: #EBF1F8;
    --articolo: #2B4C3F;
    --articolo-bg: #E8F0ED;
    --newsletter: #5C3A1A;
    --newsletter-bg: #F5EDE3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.6;
  }

  header {
    padding: 2rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  header span {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .step { display: none; }
  .step.active { display: block; }

  /* STEP 1 — RUOLO */
  .step-label {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 1rem;
  }

  .step-question {
    font-family: 'DM Serif Display', serif;
    font-size: 1.75rem;
    font-weight: 400;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 2rem;
    max-width: 520px;
  }

  .roles {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 2rem;
  }

  .role-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.125rem 1rem;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    position: relative;
  }

  .role-btn:hover {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .role-btn.selected {
    border-color: var(--accent);
    border-width: 2px;
    background: var(--accent-light);
  }

  .role-btn .rl {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
  }

  .role-btn .rs {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: 300;
  }

  .btn-avanti {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 0.75rem 1.5rem;
    font-size: 0.875rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-avanti:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .btn-avanti:not(:disabled):hover { opacity: 0.85; }

  /* STEP 2 — PERCORSO */
  .percorso-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.75rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .percorso-top-left h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 0.25rem;
  }

  .percorso-top-left p {
    font-size: 0.825rem;
    color: var(--text-muted);
    font-weight: 300;
  }

  .btn-back {
    font-size: 0.8rem;
    color: var(--text-muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-back:hover { color: var(--text); border-color: var(--text-muted); }

  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  .tab {
    font-size: 0.8rem;
    font-family: 'DM Sans', sans-serif;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.12s;
  }

  .tab:hover { border-color: var(--text-muted); color: var(--text); }

  .tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .status-bar {
    font-size: 0.75rem;
    color: var(--text-faint);
    margin-bottom: 1rem;
    font-style: italic;
  }

  .cards { display: flex; flex-direction: column; gap: 8px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.125rem 1.25rem;
    transition: border-color 0.12s;
  }

  .card:hover { border-color: var(--text-faint); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 0.5rem;
  }

  .tag {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 12px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .tag-podcast { background: var(--podcast-bg); color: var(--podcast); }
  .tag-articolo { background: var(--articolo-bg); color: var(--articolo); }
  .tag-newsletter { background: var(--newsletter-bg); color: var(--newsletter); }

  .card-title {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 0.375rem;
  }

  .card-desc {
    font-size: 0.825rem;
    color: var(--text-muted);
    line-height: 1.55;
    font-weight: 300;
    margin-bottom: 0.625rem;
  }

  .card-link {
    font-size: 0.78rem;
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }

  .card-link:hover { text-decoration: underline; }

  .empty-msg {
    font-size: 0.875rem;
    color: var(--text-muted);
    font-style: italic;
    padding: 1rem 0;
  }

  .loading-msg {
    font-size: 0.825rem;
    color: var(--text-faint);
    font-style: italic;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2rem 0;
  }

  footer {
    text-align: center;
    padding: 1.5rem;
    font-size: 0.75rem;
    color: var(--text-faint);
    border-top: 1px solid var(--border);
    font-weight: 300;
  }

  footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 480px) {
    .step-question { font-size: 1.4rem; }
    .roles { grid-template-columns: 1fr 1fr; }
    header { padding: 1.25rem; }
    main { padding: 1.5rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Il Cantiere del Welfare</h1>
  <span>Orientati</span>
</header>

<main>

  <!-- STEP 1 -->
  <div class="step active" id="step-role">
    <div class="step-label">Percorso personalizzato</div>
    <div class="step-question">Chi sei?</div>
    <div class="roles">
      <button class="role-btn" data-role="assistente" data-cats="anziani,disabilita,disuguaglianze,ltc,strumenti">
        <div class="rl">Assistente sociale</div>
        <div class="rs">Operatore di servizio</div>
      </button>
      <button class="role-btn" data-role="dirigente" data-cats="ecosistemi-ibridi,futuro,pa,strumenti,ponte-di-kublai">
        <div class="rl">Dirigente di ambito</div>
        <div class="rs">Area sociale / distretto</div>
      </button>
      <button class="role-btn" data-role="assessore" data-cats="futuro,disuguaglianze,demografia,giovani,pa">
        <div class="rl">Amministratore</div>
        <div class="rs">Assessore / sindaco</div>
      </button>
      <button class="role-btn" data-role="terzo" data-cats="ecosistemi-ibridi,strumenti,ponte-di-kublai,futuro">
        <div class="rl">Terzo settore</div>
        <div class="rs">Cooperative / ETS</div>
      </button>
      <button class="role-btn" data-role="studente" data-cats="futuro,demografia,cultura,lavoro,disuguaglianze">
        <div class="rl">Studente / ricercatore</div>
        <div class="rs">Formazione / accademia</div>
      </button>
    </div>
    <button class="btn-avanti" id="btn-avanti" disabled>Mostrami il percorso →</button>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="step-percorso">
    <div class="percorso-top">
      <div class="percorso-top-left">
        <h2 id="percorso-titolo"></h2>
        <p id="percorso-sub"></p>
      </div>
      <button class="btn-back" id="btn-back">← cambia ruolo</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-filter="tutti">Tutti</button>
      <button class="tab" data-filter="podcast">Podcast</button>
      <button class="tab" data-filter="articolo">Articoli</button>
      <button class="tab" data-filter="newsletter">Newsletter</button>
    </div>

    <div class="status-bar" id="status-bar"></div>
    <div class="cards" id="cards"></div>

    <hr class="divider">
    <div style="font-size:0.825rem;color:var(--text-muted);font-weight:300;">
      Vuoi approfondire? Visita <a href="https://www.ilcantierewelfare.it" target="_blank" style="color:var(--accent);font-weight:500;">ilcantierewelfare.it</a> o ascolta il podcast su
      <a href="https://open.spotify.com/show/cantierewelfarepodcast-cmd" target="_blank" style="color:var(--accent);font-weight:500;">Spotify</a>.
    </div>
  </div>

</main>

<footer>
  <a href="https://www.ilcantierewelfare.it">Il Cantiere del Welfare</a> · Davide Vairani
</footer>

<script>
const CF_WORKER = 'https://hidden-credit-a674.cantierewelfare-podcast.workers.dev/?url=';

async function fetchWithFallback(url) {
  try {
    const res = await fetch(CF_WORKER + encodeURIComponent(url));
    const text = await res.text();
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, 'application/xml');
    const items = xml.querySelectorAll('item');
    return Array.from(items).map(item => ({
      title: item.querySelector('title')?.textContent || '',
      link: item.querySelector('link')?.textContent || item.querySelector('guid')?.textContent || '',
      description: item.querySelector('description')?.textContent || '',
      pubDate: item.querySelector('pubDate')?.textContent || '',
      categories: Array.from(item.querySelectorAll('category')).map(c => c.textContent),
      enclosure: { link: item.querySelector('enclosure')?.getAttribute('url') || '' }
    }));
  } catch(e) { console.error('Feed error:', e); return []; }
}
const WP_FEED = 'https://www.ilcantierewelfare.it/feed/';
const POD_FEED = 'https://anchor.fm/s/1096ce4cc/podcast/rss';

const ruoli = {
  assistente: { titolo: 'Per chi lavora sul campo', sub: 'Risorse per l\'operatore del servizio sociale' },
  dirigente:  { titolo: 'Per chi guida un ambito', sub: 'Governance, innovazione e strumenti operativi' },
  assessore:  { titolo: 'Per chi decide le politiche', sub: 'Visione strategica e trasformazione del welfare locale' },
  terzo:      { titolo: 'Per il terzo settore', sub: 'Co-progettazione, partnership e innovazione sociale' },
  studente:   { titolo: 'Per studenti e ricercatori', sub: 'Dati, teoria e riferimenti sul welfare territoriale' }
};

const newsletterFissi = [
  { titolo: 'Le Fondamenta #25 — Cosa rimane quando il progetto finisce?', desc: 'Spunti dal progetto WILL e dalla conversazione con Marcella Messina sul ciclo dell\'innovazione nel welfare.', link: 'https://www.ilcantierewelfare.it/newsletter/' },
  { titolo: 'Le Fondamenta #24 — Il welfare generativo', desc: 'Riferimenti e materiali sulla transizione verso modelli di welfare abilitante.', link: 'https://www.ilcantierewelfare.it/newsletter/' },
  { titolo: 'Le Fondamenta #23 — Co-programmazione: promessa o realtà?', desc: 'Analisi degli strumenti del Codice del Terzo Settore a due anni dalla riforma.', link: 'https://www.ilcantierewelfare.it/newsletter/' },
];

let allItems = [];
let selectedRole = null;
let selectedCats = [];
let activeFilter = 'tutti';

document.querySelectorAll('.role-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedRole = btn.dataset.role;
    selectedCats = btn.dataset.cats.split(',');
    document.getElementById('btn-avanti').disabled = false;
  });
});

document.getElementById('btn-avanti').addEventListener('click', async () => {
  const r = ruoli[selectedRole];
  document.getElementById('percorso-titolo').textContent = r.titolo;
  document.getElementById('percorso-sub').textContent = r.sub;
  document.getElementById('step-role').classList.remove('active');
  document.getElementById('step-percorso').classList.add('active');
  activeFilter = 'tutti';
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.filter === 'tutti'));
  await loadContent();
});

document.getElementById('btn-back').addEventListener('click', () => {
  document.getElementById('step-percorso').classList.remove('active');
  document.getElementById('step-role').classList.add('active');
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    activeFilter = tab.dataset.filter;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderCards();
  });
});

function stripHtml(html) {
  const d = document.createElement('div');
  d.innerHTML = html || '';
  return (d.textContent || '').trim();
}

function truncate(str, n) {
  const s = stripHtml(str);
  return s.length > n ? s.slice(0, n).trimEnd() + '...' : s;
}

function normalize(str) {
  return (str || '').toLowerCase()
    .replace(/[àáâ]/g,'a').replace(/[èéê]/g,'e')
    .replace(/[ìíî]/g,'i').replace(/[òóô]/g,'o')
    .replace(/[ùúû]/g,'u').replace(/\s+/g,'-');
}

async function fetchFeed(url) {
  return await fetchWithFallback(url);
}

async function loadContent() {
  const status = document.getElementById('status-bar');
  const cards = document.getElementById('cards');
  cards.innerHTML = '<div class="loading-msg">Caricamento contenuti...</div>';
  status.textContent = '';
  allItems = [];

  const [wpItems, podItems] = await Promise.all([fetchFeed(WP_FEED), fetchFeed(POD_FEED)]);

  wpItems.forEach(item => {
    const cats = (item.categories || []).map(normalize);
    const isNewsletter = cats.includes('newsletter');
    const isPodcast = cats.includes('podcast');
    const matchesCats = selectedCats.some(sc => cats.includes(sc));
    if (!matchesCats && !isNewsletter && !isPodcast) return;
    allItems.push({
      tipo: isNewsletter ? 'newsletter' : isPodcast ? 'podcast' : 'articolo',
      titolo: item.title || '',
      desc: truncate(item.description || item.content || '', 130),
      link: item.link || '#',
      data: item.pubDate ? new Date(item.pubDate) : new Date(0)
    });
  });

  podItems.slice(0, 10).forEach(item => {
    if (allItems.find(i => i.titolo === item.title)) return;
    allItems.push({
      tipo: 'podcast',
      titolo: item.title || '',
      desc: truncate(item.description || '', 130),
      link: item.link || item.enclosure?.link || '#',
      data: item.pubDate ? new Date(item.pubDate) : new Date(0)
    });
  });

  newsletterFissi.forEach(n => {
    allItems.push({ tipo: 'newsletter', titolo: n.titolo, desc: n.desc, link: n.link, data: new Date(0) });
  });

  allItems.sort((a, b) => b.data - a.data);

  const n = allItems.filter(i => i.tipo !== 'newsletter').length;
  status.textContent = n > 0 ? n + ' contenuti caricati' : '';
  renderCards();
}

function renderCards() {
  const container = document.getElementById('cards');
  const filtered = activeFilter === 'tutti' ? allItems : allItems.filter(i => i.tipo === activeFilter);
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-msg">Nessun contenuto trovato.</div>';
    return;
  }
  container.innerHTML = filtered.slice(0, 10).map(item => `
    <div class="card">
      <div class="card-top">
        <div style="flex:1">
          <div class="card-title">${item.titolo}</div>
        </div>
        <span class="tag tag-${item.tipo}">${item.tipo}</span>
      </div>
      <div class="card-desc">${item.desc}</div>
      <a class="card-link" href="${item.link}" target="_blank">Vai al contenuto →</a>
    </div>
  `).join('');
}
</script>
</body>
</html>
