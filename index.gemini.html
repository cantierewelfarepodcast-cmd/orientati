<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&family=Karla:wght@400;500&display=swap" rel="stylesheet">
    <style>
        #cantiere-orientati { font-family: 'Karla', sans-serif; font-size: 17px; color: #1a1a1a; max-width: 1100px; margin: 0 auto; line-height: 1.6; }
        .search-container { margin-bottom: 25px; }
        #search-input { width: 100%; padding: 18px; border: 2px solid #2B4C3F; border-radius: 8px; font-family: 'Karla'; font-size: 18px; outline: none; box-sizing: border-box; background: #fff; }
        .filtri-wrapper { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; background: #fdfcf9; padding: 25px; border-radius: 12px; border: 1px solid #e5e5e5; }
        .gruppo-filtro { flex: 1; min-width: 280px; }
        .label-filtro { font-family: 'Inter'; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #2B4C3F; margin-bottom: 15px; display: block; letter-spacing: 1px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .nav-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 16px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 6px; font-family: 'Karla'; font-size: 15px; transition: all 0.2s; }
        .filter-btn.active { background: #2B4C3F; color: #fff; border-color: #2B4C3F; }
        .archivio-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; }
        .archivio-table th { text-align: left; padding: 15px; background: #2B4C3F; color: #fff; font-family: 'Inter'; font-size: 11px; text-transform: uppercase; }
        .archivio-table td { padding: 18px 15px; border-bottom: 1px solid #f0f0f0; }
        .tag { font-size: 9px; font-weight: 700; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; margin-right: 12px; display: inline-block; min-width: 75px; text-align: center; }
        .tag-articolo { background: #E8F5E9; color: #2E7D32; }
        .tag-news { background: #FFF3E0; color: #E65100; }
        .tag-podcast { background: #E3F2FD; color: #1976D2; }
        .tag-pdf { background: #FFEBEE; color: #C62828; }
        .title-link { color: #1a1a1a; text-decoration: none; font-weight: 700; font-size: 17px; }
        .title-link:hover { color: #2B4C3F; text-decoration: underline; }
        .date-cell { color: #999; font-size: 13px; width: 110px; }
    </style>
</head>
<body>

<div id="cantiere-orientati">
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Cerca tra tutti i 111 contenuti..." onkeyup="mainFilter()">
    </div>

    <div class="filtri-wrapper">
        <div class="gruppo-filtro">
            <span class="label-filtro">Profilo</span>
            <div class="nav-buttons">
                <button class="filter-btn active btn-p" onclick="setProfile('all', this)">Tutti</button>
                <button class="filter-btn btn-p" onclick="setProfile('operatore', this)">Operatore</button>
                <button class="filter-btn btn-p" onclick="setProfile('dirigente', this)">Dirigente/PA</button>
                <button class="filter-btn btn-p" onclick="setProfile('terzoSettore', this)">Terzo Settore</button>
            </div>
        </div>
        <div class="gruppo-filtro">
            <span class="label-filtro">Percorso</span>
            <div class="nav-buttons">
                <button class="filter-btn active btn-c" onclick="setCat('all', this)">Tutto</button>
                <button class="filter-btn btn-c" onclick="setCat('articolo', this)">Articoli</button>
                <button class="filter-btn btn-c" onclick="setCat('news', this)">News</button>
                <button class="filter-btn btn-c" onclick="setCat('podcast', this)">Podcast</button>
                <button class="filter-btn btn-c" onclick="setCat('pdf', this)">Scaricabili</button>
            </div>
        </div>
    </div>

    <table class="archivio-table">
        <thead>
            <tr>
                <th>Data</th>
                <th>Risorsa</th>
            </tr>
        </thead>
        <tbody id="main-tbody"></tbody>
    </table>
</div>

let activeProfile = 'all', activeCat = 'all';

function render(data) {
    const tbody = document.getElementById('main-tbody');
    tbody.innerHTML = data.length ? data.map(item => `
        <tr>
            <td class="date-cell">${item.d}</td>
            <td>
                <span class="tag tag-${item.cat}">${item.cat}</span>
                <a href="${item.l}" class="title-link">${item.t}</a>
            </td>
        </tr>
    `).join('') : '<tr><td colspan="2" style="text-align:center;padding:40px;color:#999;">Nessuna risorsa trovata.</td></tr>';
}

function setProfile(p, btn) {
    activeProfile = p;
    document.querySelectorAll('.btn-p').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mainFilter();
}

function setCat(c, btn) {
    activeCat = c;
    document.querySelectorAll('.btn-c').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mainFilter();
}

function mainFilter() {
    const query = document.getElementById('search-input').value.toLowerCase();
    render(DB.filter(item => 
        (activeProfile === 'all' || item.p.includes(activeProfile)) &&
        (activeCat === 'all' || item.cat === activeCat) &&
        (item.t.toLowerCase().includes(query))
    ));
}

render(DB);
</script>

</html>
