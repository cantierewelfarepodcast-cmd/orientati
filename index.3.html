<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il Cantiere del Welfare — Orientati</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&family=Karla:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: transparent; 
  --surface: #FFFFFF;
  --text: #1A1A18;
  --text-muted: #6B6B65;
  --text-faint: #9E9E96;
  --accent: #2B4C3F;
  --accent-light: #E8F0ED;
  --border: #E2DDD6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Karla', sans-serif; font-size: 17px; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

/* HEADER NASCOSTO PER INTEGRAZIONE SITO (Senza doppio logo) */
header { display: none; } 

main { max-width: 1300px; margin: 0 auto; padding: 2rem 1.5rem; }
.step { display: none; } .step.active { display: block; }

.percorso-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; gap: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; }
.percorso-top-info { flex: 1; }
#tema-desc { font-size: 1.15rem; color: var(--text-muted); max-width: 1000px; }

.temi { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 2rem 0; }
.tema-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; cursor: pointer; text-align: left; min-height: 140px; display: flex; flex-direction: column; transition: 0.2s; }
.tema-btn.selected { border: 2px solid var(--accent); background: var(--accent-light); }
.tema-btn .tl { font-family: 'Inter', sans-serif; font-weight: 700; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }

.btn-vai { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 1rem 2rem; font-weight: 600; cursor: pointer; }
.btn-vai:disabled { opacity: 0.35; }

.sez { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
.card { padding: 1.25rem 0; border-bottom: 1px solid var(--border); display: flex; gap: 20px; align-items: flex-start; }
.card-img { width: 140px; height: 95px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: #f0f0f0; }
.card-body { flex: 1; }
.card-title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1.1rem; margin-bottom: 5px; }

@media (max-width: 1024px) { .temi { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) { .temi { grid-template-columns: 1fr; } .card { flex-direction: column; } .card-img { width: 100%; height: 180px; } }
</style>
</head>
<body>

<main>
  <div class="step active" id="step-tema">
    <h1 style="font-family:'Inter'; margin-bottom:1rem;">Orientati tra i contenuti</h1>
    <div class="temi">
      <button class="tema-btn" data-tema="nonAutosufficienza"><div class="tl">Non autosufficienza</div><div class="ts">Anziani, RSA e riforma della cura.</div></button>
      <button class="tema-btn" data-tema="coprogettazione"><div class="tl">Co-progettazione</div><div class="ts">Terzo settore e amministrazione condivisa.</div></button>
      <button class="tema-btn" data-tema="innovazione"><div class="tl">Innovazione</div><div class="ts">Welfare generativo e nuovi modelli.</div></button>
      <button class="tema-btn" data-tema="demografia"><div class="tl">Demografia</div><div class="ts">Invecchiamento e disuguaglianze.</div></button>
      <button class="tema-btn" data-tema="strumenti"><div class="tl">Strumenti e governance</div><div class="ts">Piani di zona e programmazione.</div></button>
      <button class="tema-btn" data-tema="giovani"><div class="tl">Giovani</div><div class="ts">Generazioni e partecipazione.</div></button>
      <button class="tema-btn" data-tema="cultura"><div class="tl">Cultura e cura</div><div class="ts">Welfare culturale e spazi ibridi.</div></button>
    </div>
    <button class="btn-vai" id="btn-vai" disabled>Esplora i contenuti →</button>
  </div>

  <div class="step" id="step-contenuti">
    <div class="percorso-top">
      <div class="percorso-top-info">
        <h2 id="tema-titolo" style="font-family:'Inter'; color:var(--accent);"></h2>
        <p id="tema-desc"></p>
      </div>
      <button onclick="location.reload()" style="cursor:pointer; padding:5px 10px;">← Cambia tema</button>
    </div>
    <div class="sez">
      <div id="cards-art"></div>
    </div>
  </div>
</main>

<script>
const CF = 'https://hidden-credit-a674.cantierewelfare-podcast.workers.dev/?url=';
const WP = 'https://www.ilcantierewelfare.it/feed/';
const LOGO_BACKUP = 'https://www.ilcantierewelfare.it/wp-content/uploads/2026/01/LOGO-SOTTILE.png';

const temi = {
  nonAutosufficienza: { titolo: 'Non autosufficienza', desc: 'Anziani, disabilità e riforma della cura.', kw: ['autosufficienza','anzian','rsa','caregiver'] },
  coprogettazione: { titolo: 'Co-progettazione', desc: 'Terzo settore e amministrazione condivisa.', kw: ['coprogettazione','co-progettazione','terzo settore','cooperativ'] },
  innovazione: { titolo: 'Innovazione', desc: 'Welfare generativo e nuovi modelli.', kw: ['innovazione','generativ','sperimentazione'] },
  demografia: { titolo: 'Demografia', desc: 'Invecchiamento e disuguaglianze territoriali.', kw: ['demograf','invecchiam','disuguaglian'] },
  strumenti: { titolo: 'Strumenti e governance', desc: 'Piani di zona e programmazione sociale.', kw: ['governance','piano di zona','programmazione'] },
  giovani: { titolo: 'Giovani', desc: 'Nuove generazioni e partecipazione.', kw: ['giovan','generazione','gen z'] },
  cultura: { titolo: 'Cultura e cura', desc: 'Welfare culturale e spazi ibridi.', kw: ['cultura','arte','ibridi'] }
};

let selected = null;
document.querySelectorAll('.tema-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tema-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selected = btn.dataset.tema;
    document.getElementById('btn-vai').disabled = false;
  });
});

document.getElementById('btn-vai').addEventListener('click', async () => {
  const t = temi[selected];
  document.getElementById('tema-titolo').textContent = t.titolo;
  document.getElementById('tema-desc').textContent = t.desc;
  document.getElementById('step-tema').classList.remove('active');
  document.getElementById('step-contenuti').classList.add('active');
  await loadContents(t.kw);
});

async function loadContents(kw) {
  const el = document.getElementById('cards-art');
  el.innerHTML = "Caricamento...";
  
  try {
    const res = await fetch(CF + encodeURIComponent(WP));
    const txt = await res.text();
    const xml = new DOMParser().parseFromString(txt, 'application/xml');
    const items = Array.from(xml.querySelectorAll('item'));

    const filtered = items.filter(i => {
      const content = (i.querySelector('title').textContent + i.querySelector('description').textContent).toLowerCase();
      return kw.some(k => content.includes(k.toLowerCase()));
    });

    el.innerHTML = filtered.map(i => {
      const desc = i.querySelector('description').textContent;
      // Cerca l'immagine in vari tag comuni dei feed
      let img = LOGO_BACKUP;
      const imgMatch = desc.match(/<img[^>]+src=["']([^"']+)["']/);
      if (imgMatch) img = imgMatch[1];
      
      return `
        <div class="card">
          <img src="${img}" class="card-img" onerror="this.src='${LOGO_BACKUP}'">
          <div class="card-body">
            <div class="card-title">${i.querySelector('title').textContent}</div>
            <a href="${i.querySelector('link').textContent}" target="_blank" style="color:var(--accent); font-weight:600; text-decoration:none;">Leggi →</a>
          </div>
        </div>
      `;
    }).join('');
  } catch(e) { el.innerHTML = "Errore nel caricamento."; }
}
</script>
</body>
</html>
